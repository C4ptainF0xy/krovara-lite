name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: krovara
          POSTGRES_PASSWORD: krovara
          POSTGRES_DB: krovara
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U krovara -d krovara"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - run: go vet ./...
      - run: go test ./... -count=1 -timeout 10m

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

  images:
    needs: [go, web]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: api image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
      - name: worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: true
          tags: ghcr.io/${{ github.repository }}/worker:${{ github.sha }}
      - name: web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ghcr.io/${{ github.repository }}/web:${{ github.sha }}

  # Security gate: scan the freshly built API image for known CVEs. Distroless
  # base keeps this near-empty; fail the pipeline on a fixable CRITICAL.
  trivy:
    needs: [images]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan API image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  # Continuous deployment: on green main, SSH into the VPS and run the versioned
  # deploy script (git pull → compose build → up, migrations run as a one-shot).
  # Requires repo secrets DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY (see
  # docs/DEPLOYMENT.md). Skipped automatically if DEPLOY_HOST is unset.
  deploy:
    needs: [go, web, images, trivy]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Guard — skip if no deploy target configured
        id: guard
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "no DEPLOY_HOST secret — skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy over SSH
        if: steps.guard.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            cd /opt/krovara
            ./scripts/deploy.sh
