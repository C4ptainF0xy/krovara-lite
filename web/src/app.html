<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <meta name="theme-color" content="#0F0F14" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Krovara</title>
    %sveltekit.head%
  </head>
  <!-- Preload route code+data on hover/tap so navigation feels instant: the
       target route is fetched before the click lands, instead of starting to
       load only on click (which read as "I have to click the section twice"). -->
  <body class="bg-base text-content antialiased" data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
