# Coturn — STUN/TURN for Krovara VoIP (session 17).
#
# Auth: TURN REST API mode (RFC 8489 §10) — clients receive a short-lived
# username/credential pair from POST /api/voip/turn-credentials, signed
# with the shared static-auth-secret below.

# Listen on all interfaces; ports are exposed at compose-level.
listening-port=3478
tls-listening-port=5349

# Allocate UDP relay ports in this range. Forward this range in your
# firewall and in compose `ports:`.
min-port=49152
max-port=49199

# REST API auth.
use-auth-secret
static-auth-secret=${COTURN_AUTH_SECRET}
realm=${KROVARA_DOMAIN}

# Logging.
verbose
no-stdout-log
log-file=stdout
simple-log

# Hardening.
no-cli
no-multicast-peers
no-loopback-peers
fingerprint
lt-cred-mech
